<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GMind</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <section class="brand">
          <div class="mark">G</div>
          <div>
            <h1>GMind</h1>
            <p id="status-line">正在连接知识库...</p>
          </div>
        </section>

        <nav class="nav">
          <button class="nav-item active" data-tab="home">概览</button>
          <button class="nav-item" data-tab="quick-add">记一条</button>
          <button class="nav-item" data-tab="ask">问 AI</button>
          <button class="nav-item" data-tab="taotie">饕餮盛宴</button>
          <button class="nav-item" data-tab="settings">模型配置</button>
          <button class="nav-item" data-tab="diagnostics">诊断</button>
        </nav>
      </aside>

      <section class="content">
        <section id="tab-home" class="tab active">
          <header class="page-header">
            <div>
              <p class="eyebrow">Knowledge Base</p>
              <h2>今天的知识库</h2>
            </div>
            <span id="server-pill" class="pill">Checking</span>
          </header>

          <div class="metric-grid">
            <article class="metric">
              <span>笔记</span>
              <strong id="page-count">-</strong>
            </article>
            <article class="metric">
              <span>连接</span>
              <strong id="edge-count">-</strong>
            </article>
            <article class="metric">
              <span>LLM 增强</span>
              <strong id="enriched-count">-</strong>
            </article>
          </div>

          <section class="panel">
            <div class="panel-head">
              <h3>最近</h3>
              <button class="ghost" id="refresh-home">刷新</button>
            </div>
            <div id="recent-list" class="list empty">暂无最近内容</div>
          </section>
        </section>

        <section id="tab-quick-add" class="tab">
          <header class="page-header">
            <div>
              <p class="eyebrow">Quick Add</p>
              <h2>记一条</h2>
            </div>
          </header>
          <textarea id="quick-content" class="composer" placeholder="想到了什么？直接贴进来..."></textarea>
          <footer class="toolbar">
            <span id="quick-message" class="hint"></span>
            <button id="save-note">记住</button>
          </footer>
        </section>

        <section id="tab-ask" class="tab">
          <header class="page-header">
            <div>
              <p class="eyebrow">Ask AI</p>
              <h2>问你的知识库</h2>
            </div>
          </header>
          <div class="ask-bar">
            <input id="ask-input" placeholder="输入问题，按回车问 AI 或搜索" />
            <button id="ask-button">提问</button>
          </div>
          <div id="ask-message" class="hint"></div>
          <section id="answer-box" class="answer empty">答案会出现在这里</section>
        </section>

        <section id="tab-taotie" class="tab">
          <header class="page-header">
            <div>
              <p class="eyebrow">Taotie</p>
              <h2>饕餮盛宴</h2>
            </div>
            <button id="scan-button">开始扫描</button>
          </header>
          <div class="split">
            <section class="panel">
              <div class="panel-head">
                <h3>扫描结果</h3>
                <span id="scan-count" class="hint"></span>
              </div>
              <div id="scan-list" class="list empty">点击开始扫描全电脑</div>
              <footer class="toolbar">
                <button id="queue-selected" class="secondary">加入队列</button>
              </footer>
            </section>
            <section class="panel">
              <div class="panel-head">
                <h3>入库队列</h3>
                <div class="button-row">
                  <button id="queue-start" class="ghost">开始</button>
                  <button id="queue-pause" class="ghost">暂停</button>
                </div>
              </div>
              <div id="queue-list" class="list empty">暂无队列</div>
            </section>
          </div>
        </section>

        <section id="tab-settings" class="tab">
          <header class="page-header">
            <div>
              <p class="eyebrow">Settings</p>
              <h2>模型配置</h2>
            </div>
          </header>
          <form id="model-form" class="form">
            <label>
              <span>Provider</span>
              <select id="provider">
                <option value="openai">SiliconFlow / OpenAI</option>
                <option value="ollama">Ollama 本地</option>
              </select>
            </label>
            <label>
              <span>Model</span>
              <input id="model" />
            </label>
            <label id="api-key-row">
              <span>API Key</span>
              <input id="api-key" type="password" />
            </label>
            <label>
              <span>Base URL</span>
              <input id="base-url" />
            </label>
            <footer class="toolbar">
              <span id="settings-message" class="hint"></span>
              <button type="submit">保存</button>
            </footer>
          </form>
        </section>

        <section id="tab-diagnostics" class="tab">
          <header class="page-header">
            <div>
              <p class="eyebrow">Diagnostics</p>
              <h2>运行状态</h2>
            </div>
          </header>
          <section class="panel">
            <div class="row">
              <span>HTTP Server</span>
              <strong id="diag-server">Checking</strong>
            </div>
            <div class="row">
              <span>CLI</span>
              <strong id="diag-cli">Checking</strong>
            </div>
            <p id="diag-message" class="hint"></p>
            <div class="toolbar">
              <button id="restart-server" class="secondary">重启服务</button>
              <button id="refresh-diagnostics" class="ghost">刷新</button>
            </div>
          </section>
        </section>
      </section>
    </main>
    <script src="/main.js"></script>
  </body>
</html>
